---
- name: Webcontent
  hosts: dev
  become: true
  tasks:
     - name: Enable httpd and firewalld
       ansible.builtin.systemd_service:
          name: "{{ item }}"
          state: started
          enabled: true
       loop:
          - httpd
          - firewalld
     - name: Permits
       ansible.posix.firewalld:
          service: http
          permanent: true
          immediate: true
          state: enabled
     - name: Create webdev grp
       ansible.builtin.group:
          name: webdev
          state: present
     - name: Create directory
       ansible.builtin.file:
          name: /webdev
          state: directory
          mode: '2775'
          setype: httpd_sys_content_t
     - name: Link
       ansible.builtin.file:
         src: /webdev
         dest: /var/www/html/webdev
         state: link
         force: true
     - name: Copy 
       ansible.builtin.copy:
          content: Development
          dest: /webdev/index.html
          setype: httpd_sys_content_t  
      