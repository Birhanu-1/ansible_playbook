---
# tasks file for roles/apache
- name: Install httpd
  ansible.builtin.dnf:
    name:
      - httpd
      - firewalld
    state: present
- name: Enable httpd service
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
     - httpd
     - firewalld
- name: Permits
  ansible.posix.firewalld:
    service: http
    permanent: true
    immediate: true
    state: enabled
- name:  Depploy web server
  ansible.builtin.template:
    src: index.html.j2
    dest: /var/www/html/index.html